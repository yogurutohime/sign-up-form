<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="picture">
            <img src="odin-lined.png" alt="Odin logo" width="50px">
            <div class="logo">ODIN</div>
        </div>
        <footer>Photo by <em>Quan Jing</em> on <em>Unsplash</em></footer>
    </header>
    <main>
        <div class="dummy">
            <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <em>now</em> to get started.</p>
            <p>You <em>know</em> you want to.</p>
        </div>
        <div class="form">
            <form action="POST">
                <div class="container">
                    <p>Let's Do This!</p>
                    <div class="input">
                        <label for="firstname">FIRST NAME</label>
                        <input type="text" required>
                    </div>
                    <div class="input">
                        <label for="lastname">LAST NAME</label>
                        <input type="text" required>
                    </div>
                    <div class="input">
                        <label for="email">EMAIL</label>
                        <input type="email" required>
                    </div>
                    <div class="input">
                        <label for="phone">PHONE</label>
                        <input type="tel" required>
                    </div>
                    <div class="input">
                        <label for="password">PASSWORD</label>
                        <input type="password" required>
                    </div>
                    <div class="input">
                        <label for="confirmpassword">CONFIRM PASSWORD</label>
                        <input type="password" required>
                    </div>
                </div>
                <button>CREATE ACCOUNT</button>
            </form>
        </div>
        <p>Already have an account? Log in</p>
    </main>
</body>
</html>
